services:
  postgres:
    image: postgres:16-alpine
    container_name: mcp-text-to-sql-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mcp_text_to_sql
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_text_to_sql"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
